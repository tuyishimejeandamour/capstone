base_model: google/functiongemma-270m-it
dataset_dir: ../dataset/ranga_output
checkpoint_dir: results/checkpoints
reports_dir: results/reports

learning_rate: 5.0e-5
num_train_epochs: 6
per_device_train_batch_size: 2
per_device_eval_batch_size: 2
max_length: 2048
gradient_accumulation_steps: 4
warmup_ratio: 0.05
weight_decay: 0.01
seed: 42

train_split: 0.9
max_hospitals_in_tool_payload: 2
push_to_hub: false

sft_file: ranga_sft_500.jsonl
eval_file: ranga_eval_50.jsonl
tools_file: ranga_tools.json
